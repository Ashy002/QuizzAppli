<!DOCTYPE html>
<html th:fragment="layout(content)"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --bg: #f1f8e9;
            --brown: #4e342e;
            --brown-dark: #3e2723;
        }
        * { box-sizing: border-box; }

        body {
            background-color: var(--bg);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }

        /* ── Contenu principal ── */
        .main-content {
            min-height: 100vh;
            padding: 40px;
        }

        /* ── Bouton hamburger fixe ── */
        .hamburger-btn {
            position: fixed;
            top: 16px; right: 16px;
            z-index: 500;
            background: var(--brown);
            border: none; color: white;
            width: 46px; height: 46px;
            border-radius: 12px;
            font-size: 1.45rem;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 4px 14px rgba(0,0,0,0.22);
            transition: background 0.2s, transform 0.15s;
        }
        .hamburger-btn:hover { background: var(--brown-dark); transform: scale(1.06); }

        /* ── Overlay sombre ── */
        .menu-overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.35);
            z-index: 490;
            backdrop-filter: blur(2px);
        }
        .menu-overlay.show { display: block; }

        /* ── Panneau menu ── */
        .slide-menu {
            position: fixed;
            top: 0; right: 0;
            width: 260px; height: 100vh;
            background: var(--bg);           /* même couleur que le fond principal */
            z-index: 495;
            padding: 72px 20px 30px;
            box-shadow: -6px 0 30px rgba(0,0,0,0.12);
            transform: translateX(110%);
            transition: transform 0.3s cubic-bezier(.4,0,.2,1);
            display: flex; flex-direction: column;
            overflow-y: auto;
        }
        .slide-menu.open { transform: translateX(0); }

        /* Titre menu */
        .menu-title {
            font-size: 0.7rem; font-weight: 700;
            letter-spacing: 1.8px; text-transform: uppercase;
            color: #a5b08a; margin-bottom: 8px; padding: 0 4px;
        }

        /* Liens menu */
        .menu-link {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 14px; border-radius: 12px;
            color: var(--brown); font-weight: 600; font-size: 0.97rem;
            text-decoration: none; cursor: pointer;
            border: none; background: transparent; width: 100%; text-align: left;
            transition: all 0.2s ease;
            margin-bottom: 2px;
        }
        .menu-link:hover {
            background: rgba(78,52,46,0.08);
            color: var(--brown-dark);
            padding-left: 20px;
        }
        .menu-link i { font-size: 1.1rem; color: var(--brown); opacity: 0.75; }

        .menu-divider { border: none; border-top: 1px solid #dde8cf; margin: 14px 0; }

        /* Bouton Quitter */
        .btn-quit-menu {
            display: flex; align-items: center; gap: 10px;
            padding: 12px 16px; border-radius: 12px;
            background: linear-gradient(135deg, var(--brown), #6d4c41);
            color: white; font-weight: 700; font-size: 0.97rem;
            border: none; cursor: pointer; width: 100%;
            transition: all 0.22s ease;
            box-shadow: 0 4px 12px rgba(78,52,46,0.25);
            margin-top: auto;
        }
        .btn-quit-menu:hover {
            background: linear-gradient(135deg, var(--brown-dark), var(--brown));
            box-shadow: 0 6px 18px rgba(78,52,46,0.35);
            transform: translateY(-1px);
        }

        /* ── Modal confirmation quiz ── */
        .custom-modal {
            display: none; position: fixed; z-index: 2000; inset: 0;
            background: rgba(0,0,0,0.55); backdrop-filter: blur(3px);
        }
        .custom-modal .modal-box {
            background: white; margin: 12% auto; padding: 38px 32px;
            border-radius: 20px; width: 92%; max-width: 440px;
            text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            animation: modalIn 0.2s ease;
        }
        @keyframes modalIn { from { transform: scale(0.9); opacity:0; } to { transform:scale(1); opacity:1; } }
        .custom-modal .modal-box h3 { color: var(--brown); margin-bottom: 10px; }
        .custom-modal .modal-box p  { color: #777; font-size: 1rem; }

        /* Cartes génériques */
        .card { border: none; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); background: white; }

        /* Responsive */
        @media (max-width: 576px) {
            .main-content { padding: 20px 14px 80px; }
        }
    </style>
</head>
<body>

<!-- ══ BOUTON HAMBURGER ══ -->
<button class="hamburger-btn" id="hamburgerBtn" onclick="toggleMenu()" aria-label="Menu">
    <i class="bi bi-list" id="menuIcon"></i>
</button>

<!-- ══ OVERLAY ══ -->
<div class="menu-overlay" id="menuOverlay" onclick="toggleMenu()"></div>

<!-- ══ PANNEAU MENU ══ -->
<div class="slide-menu" id="slideMenu">

    <p class="menu-title">Navigation</p>
    <a href="#" class="menu-link" onclick="navTo('/dashboard')">
        <i class="bi bi-house-door-fill"></i> Accueil
    </a>

    <p class="menu-title mt-3">Quiz</p>
    <a href="#" class="menu-link" th:onclick="'navTo(\'' + @{/quiz(subject='MATHS')} + '\')'">
        <i class="bi bi-calculator-fill"></i> Mathématiques
    </a>
    <a href="#" class="menu-link" th:onclick="'navTo(\'' + @{/quiz(subject='ANGLAIS')} + '\')'">
        <i class="bi bi-translate"></i> Anglais
    </a>
    <a href="#" class="menu-link" th:onclick="'navTo(\'' + @{/quiz(subject='CHIMIE')} + '\')'">
        <i class="bi bi-eyedropper-fill"></i> Chimie
    </a>

    <hr class="menu-divider">

    <button class="btn-quit-menu" onclick="window.close()">
        <i class="bi bi-box-arrow-right"></i> Quitter
    </button>
</div>

<!-- ══ CONTENU PRINCIPAL ══ -->
<main class="main-content">
    <div th:replace="${content}"></div>
</main>

<!-- ══ MODAL CONFIRMATION (quiz actif) ══ -->
<div id="navModal" class="custom-modal">
    <div class="modal-box">
        <h3>⚠️ Quitter le quiz ?</h3>
        <p>Votre progression sera perdue si vous partez maintenant.</p>
        <div class="d-flex justify-content-center gap-3 mt-4">
            <button class="btn btn-danger btn-lg px-4" id="confirmNav">Oui, quitter</button>
            <button class="btn btn-secondary btn-lg px-4" id="cancelNav">Continuer</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">
/*<![CDATA[*/
const isQuizActive = /*[[${session.isQuizActive != null && session.isQuizActive}]]*/ false;
let targetUrl = '';

/* ── Ouvrir / fermer le menu ── */
function toggleMenu() {
    const menu    = document.getElementById('slideMenu');
    const overlay = document.getElementById('menuOverlay');
    const icon    = document.getElementById('menuIcon');
    const isOpen  = menu.classList.toggle('open');
    overlay.classList.toggle('show', isOpen);
    icon.className = isOpen ? 'bi bi-x-lg' : 'bi bi-list';
}

/* ── Navigation protégée (quiz actif ?) ── */
function navTo(url) {
    toggleMenu();          // fermer le menu d'abord
    if (isQuizActive) {
        targetUrl = url;
        document.getElementById('navModal').style.display = 'block';
    } else {
        window.location.href = url;
    }
}

document.getElementById('cancelNav').onclick = () =>
    document.getElementById('navModal').style.display = 'none';

document.getElementById('confirmNav').onclick = () => {
    document.getElementById('navModal').style.display = 'none';
    window.location.href = targetUrl;
};

document.getElementById('navModal').addEventListener('click', e => {
    if (e.target === document.getElementById('navModal'))
        document.getElementById('navModal').style.display = 'none';
});
/*]]>*/
</script>
</body>
</html>
