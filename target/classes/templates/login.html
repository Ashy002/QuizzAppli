<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - School Quiz</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --pale-green: #f1f8e9;
            --chocolate-brown: #4e342e;
        }
        body {
            background-color: var(--pale-green);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 20px;
            box-shadow: 0 12px 40px rgba(0,0,0,0.12);
            overflow: hidden;
        }
        .login-header {
            background-color: var(--chocolate-brown);
            color: white;
            padding: 30px 35px 25px;
            text-align: center;
        }
        .login-header img { margin-bottom: 12px; }
        .login-header h1 { font-size: 1.6rem; font-weight: 700; margin: 0; }
        .login-body { padding: 30px 35px; background: white; }
        .btn-login {
            background-color: var(--chocolate-brown);
            border-color: var(--chocolate-brown);
            color: white;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-login:hover { background-color: #3e2723; border-color: #3e2723; color: white; }

        @media (max-width: 480px) {
            .login-header { padding: 22px 20px 18px; }
            .login-body  { padding: 22px 20px; }
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-header">
            <img src="https://cdn-icons-png.flaticon.com/512/2436/2436633.png" width="60" alt="Logo">
            <h1>School Quiz App</h1>
            <small class="text-white-50">Connectez-vous pour jouer</small>
        </div>
        <div class="login-body">

            <div th:if="${param.error}" class="alert alert-danger d-flex align-items-center gap-2">
                <i class="bi bi-exclamation-triangle-fill"></i>
                Identifiants invalides. Réessayez.
            </div>
            <div th:if="${param.logout}" class="alert alert-success d-flex align-items-center gap-2">
                <i class="bi bi-check-circle-fill"></i>
                Vous avez été déconnecté avec succès.
            </div>

            <form th:action="@{/login}" method="post">
                <div class="mb-3">
                    <label for="username" class="form-label fw-semibold">Nom d'utilisateur</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person-fill"></i></span>
                        <input type="text" name="username" class="form-control"
                               id="username" placeholder="Entrez votre identifiant" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-semibold">Mot de passe</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock-fill"></i></span>
                        <input type="password" name="password" class="form-control"
                               id="password" placeholder="Entrez votre mot de passe" required>
                    </div>
                </div>
                <button class="w-100 btn btn-lg btn-login" type="submit">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
                </button>
            </form>

            <p class="mt-3 text-muted text-center small">
                Compte de test : <strong>user</strong> / <strong>password</strong>
            </p>
        </div>
    </div>
</body>
</html>
