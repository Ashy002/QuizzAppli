<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::div.content-fragment})}">
<body>
<div class="content-fragment">

    <div class="mb-5">
        <h1 class="display-5 fw-bold text-dark">Bonjour,
            <span class="text-success" th:text="${username}">Étudiant</span> 👋
        </h1>
        <p class="lead text-muted">Choisissez un quiz pour commencer à apprendre.</p>
    </div>

    <div class="row g-4">

        <!-- MATHS -->

        <div class="col-12 col-md-6 col-lg-4">
            <div class="card h-100 p-4 quiz-card" style="border-top: 5px solid #1565c0;">
                <img src="https://cdn-icons-png.flaticon.com/512/2436/2436633.png"
                     width="72" class="mx-auto mb-3" alt="Maths">
                <h3 class="fw-bold text-center">Mathématiques</h3>
                <p class="text-muted text-center">Testez vos compétences en calcul et logique.</p>
                <a th:href="@{/quiz(subject='MATHS')}"
                   class="btn btn-primary mt-auto py-2 fw-bold">
                    Jouer maintenant 
                </a>
            </div>
        </div>

        <!-- ANGLAIS -->

        <div class="col-12 col-md-6 col-lg-4">
            <div class="card h-100 p-4 quiz-card" style="border-top: 5px solid #2e7d32;">
                <img src="https://cdn-icons-png.flaticon.com/512/3898/3898082.png"
                     width="72" class="mx-auto mb-3" alt="Anglais">
                <h3 class="fw-bold text-center">Anglais</h3>
                <p class="text-muted text-center">Améliorez votre vocabulaire et grammaire.</p>
                <a th:href="@{/quiz(subject='ANGLAIS')}"
                   class="btn btn-success mt-auto py-2 fw-bold">
                    Jouer maintenant 
                </a>
            </div>
        </div>

        <!-- CHIMIE -->

        <div class="col-12 col-md-6 col-lg-4">
            <div class="card h-100 p-4 quiz-card" style="border-top: 5px solid #e65100;">
                <img src="https://cdn-icons-png.flaticon.com/512/3022/3022214.png"
                     width="72" class="mx-auto mb-3" alt="Chimie">
                <h3 class="fw-bold text-center">Chimie</h3>
                <p class="text-muted text-center">Découvrez les secrets de la matière.</p>
                <a th:href="@{/quiz(subject='CHIMIE')}"
                   class="btn btn-warning mt-auto py-2 fw-bold">
                    Jouer maintenant 
                </a>
            </div>
        </div>

    </div>

    <style>
        .quiz-card { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .quiz-card:hover { transform: translateY(-8px); box-shadow: 0 16px 32px rgba(0,0,0,0.12) !important; }
        @media (max-width: 576px) {
            .display-5 { font-size: 1.7rem; }
        }
    </style>
</div>
</body>
</html>
