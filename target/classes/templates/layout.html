<!DOCTYPE html>
<html th:fragment="layout(content)"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>School Quiz App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --pale-green: #f1f8e9;
            --chocolate-brown: #4e342e;
            --chocolate-dark: #3e2723;
            --dashboard-bg: #fdfbf7;
            --sidebar-width: 260px;
        }
        * { box-sizing: border-box; }
        body {
            background-color: var(--pale-green);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0; padding: 0; overflow-x: hidden;
        }
        .app-wrapper { display: flex; flex-direction: row; min-height: 100vh; }
        .main-content {
            flex: 1; min-width: 0;
            padding: 40px;
            background-color: var(--dashboard-bg);
            min-height: 100vh;
            margin-right: var(--sidebar-width);
            transition: margin-right 0.3s ease;
        }
        .sidebar {
            width: var(--sidebar-width);
            min-height: 100vh;
            background-color: var(--chocolate-brown);
            color: white;
            padding: 30px 20px;
            box-shadow: -5px 0 20px rgba(0,0,0,0.2);
            position: fixed; right: 0; top: 0; bottom: 0;
            z-index: 200; overflow-y: auto;
            transition: transform 0.3s ease;
        }
        .sidebar .user-avatar {
            background-color: rgba(255,255,255,0.15); border-radius: 50%;
            width: 75px; height: 75px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 12px;
        }
        .sidebar h4 { color: #fff; font-weight: 600; margin-bottom: 4px; font-size: 1.1rem; word-break: break-word; }
        .sidebar hr { border-color: rgba(255,255,255,0.2); margin: 18px 0; }
        .nav-section-label {
            color: rgba(255,255,255,0.45); font-size: 0.7rem; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            padding: 0 8px; margin: 14px 0 6px; display: block;
        }
        .nav-link-protected {
            color: #d7ccc8; text-decoration: none;
            display: flex; align-items: center; gap: 10px;
            padding: 11px 14px; border-radius: 8px; margin-bottom: 4px;
            transition: all 0.25s ease; font-size: 0.97rem;
            cursor: pointer; border: none; background: transparent;
            width: 100%; text-align: left;
        }
        .nav-link-protected:hover { background-color: rgba(255,255,255,0.15); color: white; padding-left: 20px; }
        .sidebar .btn-outline-light { border-color: rgba(255,255,255,0.4); color: #d7ccc8; font-size: 0.95rem; transition: all 0.25s ease; }
        .sidebar .btn-outline-light:hover { background-color: rgba(255,255,255,0.1); color: white; border-color: white; }
        .card { border: none; border-radius: 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.08); background-color: white; }
        .hamburger-btn {
            display: none; position: fixed; top: 14px; right: 14px; z-index: 300;
            background-color: var(--chocolate-brown); border: none; color: white;
            width: 46px; height: 46px; border-radius: 10px; font-size: 1.4rem;
            cursor: pointer; box-shadow: 0 3px 12px rgba(0,0,0,0.3);
            align-items: center; justify-content: center; transition: background-color 0.2s;
        }
        .hamburger-btn:hover { background-color: var(--chocolate-dark); }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 150; }
        .custom-modal { display: none; position: fixed; z-index: 2000; inset: 0; background-color: rgba(0,0,0,0.6); }
        .custom-modal .modal-box {
            background-color: white; margin: 12% auto; padding: 40px 35px;
            border-radius: 20px; width: 92%; max-width: 460px;
            text-align: center; box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            animation: modalIn 0.2s ease;
        }
        @keyframes modalIn { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .custom-modal .modal-box h3 { color: var(--chocolate-brown); margin-bottom: 12px; font-size: 1.5rem; }
        .custom-modal .modal-box p { font-size: 1.05rem; color: #666; }

        /* TABLETTE */
        @media (max-width: 991.98px) and (min-width: 768px) {
            :root { --sidebar-width: 220px; }
            .main-content { padding: 28px 22px; }
            .sidebar { padding: 24px 16px; }
        }
        /* MOBILE */
        @media (max-width: 767.98px) {
            .main-content { margin-right: 0; padding: 20px 16px 90px; width: 100%; }
            .sidebar { transform: translateX(100%); width: min(280px, 82vw); }
            .sidebar.sidebar-open { transform: translateX(0); }
            .sidebar-overlay.show { display: block; }
            .hamburger-btn { display: flex; }
        }
    </style>
</head>
<body>
<button class="hamburger-btn" id="hamburgerBtn" onclick="toggleSidebar()" aria-label="Menu">
    <i class="bi bi-list"></i>
</button>
<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>

<div class="app-wrapper">
    <main class="main-content">
        <div th:replace="${content}"></div>
    </main>
    <aside class="sidebar" id="sidebar">
        <div class="text-center mb-2">
            <div class="user-avatar shadow-sm">
                <img src="https://cdn-icons-png.flaticon.com/512/1077/1077114.png" width="48" alt="User">
            </div>
        </div>
        <nav>
            <span class="nav-section-label">Navigation</span>
            <a href="#" class="nav-link-protected" data-url="/dashboard">
                <i class="bi bi-house-door-fill"></i> Dashboard
            </a>
            <span class="nav-section-label">Quiz disponibles</span>
            <a href="#" class="nav-link-protected" th:data-url="@{/quiz(subject='MATHS')}">
                <i class="bi bi-calculator-fill"></i> Mathématiques
            </a>
            <a href="#" class="nav-link-protected" th:data-url="@{/quiz(subject='ANGLAIS')}">
                <i class="bi bi-translate"></i> Anglais
            </a>
            <a href="#" class="nav-link-protected" th:data-url="@{/quiz(subject='CHIMIE')}">
                <i class="bi bi-eyedropper-fill"></i> Chimie
            </a>
            <hr>
            <form th:action="@{/logout}" method="post" id="logoutForm">
                <button type="button" class="btn btn-outline-light w-100 py-2" onclick="confirmNavigation('/dashboard')">
                    <i class="bi bi-box-arrow-right me-2"></i>Quitter
                </button>
            </form>
        </nav>
    </aside>
</div>

<div id="navModal" class="custom-modal">
    <div class="modal-box">
        <h3>⚠️ Voulez-vous vraiment quitter le quiz ?</h3>
        <p>Votre progression sera perdue si vous quittez maintenant.</p>
        <div class="d-flex justify-content-center gap-3 mt-4">
            <button class="btn btn-danger btn-lg px-4" id="confirmNav">Oui</button>
            <button class="btn btn-secondary btn-lg px-4" id="cancelNav">Continuer</button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:inline="javascript">

    /*<![CDATA[*/

    const isQuizActive = /*[[${session.isQuizActive != null && session.isQuizActive}]]*/ false;
    let targetUrl = '';

    function confirmNavigation(url) {
        if (isQuizActive) { targetUrl = url; document.getElementById('navModal').style.display = 'block'; }
        else { executeNavigation(url); }
    }
    function executeNavigation(url) {
        if (url === '/logout') { document.getElementById('logoutForm').submit(); }
        else { window.location.href = url; }
    }
    document.querySelectorAll('.nav-link-protected').forEach(link => {
        link.addEventListener('click', e => {
            e.preventDefault();
            const url = link.getAttribute('data-url');
            if (url) confirmNavigation(url);
        });
    });
    document.getElementById('cancelNav').onclick = () => { document.getElementById('navModal').style.display = 'none'; };
    document.getElementById('confirmNav').onclick = () => {
        document.getElementById('navModal').style.display = 'none';
        executeNavigation(targetUrl);
    };
    document.getElementById('navModal').addEventListener('click', e => {
        if (e.target === document.getElementById('navModal')) document.getElementById('navModal').style.display = 'none';
    });
    function toggleSidebar() {
        const s = document.getElementById('sidebar');
        const o = document.getElementById('sidebarOverlay');
        const b = document.getElementById('hamburgerBtn');
        const open = s.classList.toggle('sidebar-open');
        o.classList.toggle('show', open);
        b.innerHTML = open ? '<i class="bi bi-x-lg"></i>' : '<i class="bi bi-list"></i>';
    }
    /*]]>*/
</script>
</body>
</html>
