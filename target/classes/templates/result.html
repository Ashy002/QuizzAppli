<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: layout(~{::div.content-fragment})}">
<body>
<div class="content-fragment">
    <div class="card p-4 p-md-5 text-center mx-auto" style="max-width: 700px;">

        <!-- Icône victoire / défaite -->

        <div class="mb-4">
            <img th:if="${score >= total / 2.0}"
                 src="https://cdn-icons-png.flaticon.com/512/3112/3112946.png"
                 alt="Trophée" style="width: 130px;">
            <img th:if="${score < total / 2.0}"
                 src="https://cdn-icons-png.flaticon.com/512/564/564619.png"
                 alt="Défaite" style="width: 130px; filter: grayscale(0.5) opacity(0.7);">
        </div>

        <!-- Titre -->

        <h1 th:if="${score >= total / 2.0}" class="display-5 text-success fw-bold mb-2">Félicitations ! 🎉</h1>
        <h1 th:if="${score < total / 2.0}"  class="display-5 text-danger  fw-bold mb-2">Pas encore... 💪</h1>

        <!-- Score -->

        <p class="lead mb-2 fs-4">Votre score :</p>
        <div class="display-4 fw-bold mb-2"
             th:classappend="${score >= total / 2.0 ? 'text-success' : 'text-danger'}"
             th:text="${score} + ' / ' + ${total}">0/10</div>

        <!-- Barre de score -->

        <div class="progress my-4" style="height: 18px; border-radius: 10px; max-width: 400px; margin: 0 auto;">
            <div class="progress-bar"
                 th:classappend="${score >= total / 2.0 ? 'bg-success' : 'bg-danger'}"
                 role="progressbar"
                 th:style="'width: ' + (${score} * 100 / ${total}) + '%'"></div>
        </div>

        <p class="text-muted mb-4"
           th:text="${score >= total / 2.0 ? 'Excellent travail ! Continuez comme ça.' : 'Ne vous découragez pas, réessayez !'}">
        </p>

        <!-- Boutons d'action -->
         
        <div class="d-flex justify-content-center flex-wrap gap-3">
            <a th:href="@{/quiz(subject=${session.subject})}" class="btn btn-primary btn-lg px-5 fw-bold">
                🔄 Rejouer
            </a>
            <a th:href="@{/dashboard}" class="btn btn-outline-secondary btn-lg px-5">
                🏠 Dashboard
            </a>
        </div>
    </div>

    <style>
        @media (max-width: 576px) {
            .display-4 { font-size: 2.5rem; }
            .display-5 { font-size: 1.8rem; }
        }
    </style>
</div>
</body>
</html>
